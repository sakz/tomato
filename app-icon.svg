<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    
    <!-- Tomato body gradient -->
    <radialGradient id="tomatoGrad" cx="35%" cy="30%" r="65%" fx="35%" fy="30%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="50%" stop-color="#dc2626" />
      <stop offset="100%" stop-color="#991b1b" />
    </radialGradient>
    
    <!-- Soft shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    
    <!-- Inner highlight -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Background square with rounded corners (macOS icon style) -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>
  
  <!-- Tomato body with shadow -->
  <circle cx="512" cy="542" r="340" fill="url(#tomatoGrad)" filter="url(#shadow)"/>
  
  <!-- Tomato highlight overlay for 3D effect -->
  <ellipse cx="432" cy="432" rx="200" ry="160" fill="url(#highlight)" transform="rotate(-20 432 432)"/>
  
  <!-- Tomato stem (calyx) - dark elegant style -->
  <path d="M512 202 
           C512 202, 472 162, 432 182 
           C392 202, 412 242, 412 242
           C412 242, 352 222, 332 262
           C312 302, 352 332, 352 332
           C352 332, 312 362, 332 402
           C352 442, 412 422, 412 422
           L512 382
           L612 422
           C612 422, 672 442, 692 402
           C712 362, 672 332, 672 332
           C672 332, 712 302, 692 262
           C672 222, 612 242, 612 242
           C612 242, 632 202, 592 182
           C552 162, 512 202, 512 202Z" 
        fill="#0f172a"/>
  
  <!-- Stem center accent -->
  <circle cx="512" cy="312" r="28" fill="#1e293b"/>
</svg>
